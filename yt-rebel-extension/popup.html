<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YT Rebel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Share+Tech+Mono&display=swap');

  :root {
    --red:     #FF0000;
    --red-dim: #cc0000;
    --red-glow:#ff000055;
    --dark:    #0a0a0a;
    --darker:  #050505;
    --surface: #111111;
    --border:  #2a0000;
    --text:    #f0f0f0;
    --muted:   #666;
    --on:      #FF0000;
    --off:     #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 280px;
    background: var(--dark);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--darker);
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 6px,
      rgba(255,0,0,0.03) 6px,
      rgba(255,0,0,0.03) 7px
    );
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--red);
    text-shadow: 0 0 12px var(--red-glow), 0 0 30px var(--red-glow);
    line-height: 1;
  }

  .logo-text span {
    color: var(--text);
    text-shadow: none;
  }

  .tagline {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-top: 4px;
    padding-left: 44px;
    text-transform: uppercase;
    position: relative;
  }

  /* ── BODY ── */
  .features {
    padding: 8px 0;
  }

  .feature-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    gap: 12px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .feature-row:last-child { border-bottom: none; }

  .feature-row:hover {
    background: rgba(255, 0, 0, 0.04);
  }

  .feature-info {
    flex: 1;
    min-width: 0;
  }

  .feature-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.2;
  }

  .feature-desc {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
    letter-spacing: 0.3px;
  }

  /* ── TOGGLE SWITCH ── */
  .toggle {
    position: relative;
    width: 42px;
    height: 22px;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--off);
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid #333;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: #555;
    border-radius: 1px;
    transition: transform 0.2s, background 0.2s;
  }

  input:checked + .slider {
    background: #200000;
    border-color: var(--red-dim);
    box-shadow: 0 0 8px var(--red-glow);
  }

  input:checked + .slider::before {
    transform: translateX(20px);
    background: var(--red);
    box-shadow: 0 0 6px var(--red-glow);
  }

  /* ── FOOTER ── */
  .footer {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--darker);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .version {
    font-size: 9px;
    color: #333;
    letter-spacing: 1px;
  }

  .all-toggle {
    font-size: 9px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid #2a2a2a;
    padding: 3px 8px;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .all-toggle:hover {
    color: var(--red);
    border-color: var(--red-dim);
    background: rgba(255,0,0,0.05);
  }

  /* Glitch effect on load */
  @keyframes glitch {
    0%   { clip-path: inset(0 0 95% 0); transform: translateX(-2px); }
    20%  { clip-path: inset(30% 0 50% 0); transform: translateX(2px); }
    40%  { clip-path: inset(60% 0 20% 0); transform: translateX(-1px); }
    60%  { clip-path: inset(10% 0 80% 0); transform: translateX(1px); }
    80%  { clip-path: inset(80% 0 5% 0); transform: translateX(-2px); }
    100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  }

  .logo-text {
    animation: glitch 0.4s steps(1) 0.1s both;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-row">
    <!-- Ícono inline: puño rompiendo el logo de YT -->
    <svg class="logo-icon" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Shield base -->
      <path d="M17 2L4 7v10c0 7.5 5.5 13.5 13 15 7.5-1.5 13-7.5 13-15V7L17 2z"
            fill="#1a0000" stroke="#FF0000" stroke-width="1.2"/>
      <!-- Broken YT play button -->
      <rect x="9" y="12" width="16" height="11" rx="2" fill="#FF0000" opacity="0.15" stroke="#FF0000" stroke-width="0.8"/>
      <!-- Crack line -->
      <path d="M17 11 L14 17 L18 17 L15 23" stroke="#FF0000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Small sparks -->
      <line x1="20" y1="13" x2="22" y2="11" stroke="#FF0000" stroke-width="0.8" opacity="0.7"/>
      <line x1="21" y1="15" x2="23" y2="15" stroke="#FF0000" stroke-width="0.8" opacity="0.5"/>
      <line x1="12" y1="21" x2="10" y2="23" stroke="#FF0000" stroke-width="0.8" opacity="0.7"/>
    </svg>
    <div>
      <div class="logo-text">YT <span>REBEL</span></div>
    </div>
  </div>
  <div class="tagline" data-i18n="tagline"></div>
</div>

<!-- FEATURES -->
<div class="features" id="features-list">

  <label class="feature-row" for="toggle-hideRecientes">
    <div class="feature-info">
      <div class="feature-name" data-i18n="hideRecientesName"></div>
      <div class="feature-desc" data-i18n="hideRecientesDesc"></div>
    </div>
    <div class="toggle">
      <input type="checkbox" id="toggle-hideRecientes" data-key="hideRecientes" />
      <span class="slider"></span>
    </div>
  </label>

  <label class="feature-row" for="toggle-hideMixes">
    <div class="feature-info">
      <div class="feature-name" data-i18n="hideMixesName"></div>
      <div class="feature-desc" data-i18n="hideMixesDesc"></div>
    </div>
    <div class="toggle">
      <input type="checkbox" id="toggle-hideMixes" data-key="hideMixes" />
      <span class="slider"></span>
    </div>
  </label>

  <label class="feature-row" for="toggle-autoReload">
    <div class="feature-info">
      <div class="feature-name" data-i18n="autoReloadName"></div>
      <div class="feature-desc" data-i18n="autoReloadDesc"></div>
    </div>
    <div class="toggle">
      <input type="checkbox" id="toggle-autoReload" data-key="autoReload" />
      <span class="slider"></span>
    </div>
  </label>

  <label class="feature-row" for="toggle-openVideosTab">
    <div class="feature-info">
      <div class="feature-name" data-i18n="openVideosTabName"></div>
      <div class="feature-desc" data-i18n="openVideosTabDesc"></div>
    </div>
    <div class="toggle">
      <input type="checkbox" id="toggle-openVideosTab" data-key="openVideosTab" />
      <span class="slider"></span>
    </div>
  </label>

</div>

<!-- FOOTER -->
<div class="footer">
  <span class="version">v1.0.0</span>
  <span class="all-toggle" id="all-toggle"></span>
</div>

<script src="popup.js"></script>
</body>
</html>
